<!DOCTYPE html>
<html>
<head><title>Icon Generator</title></head>
<body>
<canvas id="c192" width="192" height="192"></canvas>
<canvas id="c512" width="512" height="512"></canvas>
<script>
function drawIcon(canvas, size) {
  const ctx = canvas.getContext('2d');
  const p = size / 192; // scale factor

  // Background - rounded rect with gradient
  const grad = ctx.createLinearGradient(0, 0, size, size);
  grad.addColorStop(0, '#f97316');
  grad.addColorStop(1, '#ea580c');
  ctx.fillStyle = grad;

  // Rounded rect
  const r = 32 * p;
  ctx.beginPath();
  ctx.moveTo(r, 0);
  ctx.lineTo(size - r, 0);
  ctx.quadraticCurveTo(size, 0, size, r);
  ctx.lineTo(size, size - r);
  ctx.quadraticCurveTo(size, size, size - r, size);
  ctx.lineTo(r, size);
  ctx.quadraticCurveTo(0, size, 0, size - r);
  ctx.lineTo(0, r);
  ctx.quadraticCurveTo(0, 0, r, 0);
  ctx.closePath();
  ctx.fill();

  // Shield icon
  const cx = size / 2;
  const cy = size / 2 - 5 * p;
  const sw = 60 * p; // shield width
  const sh = 72 * p; // shield height

  ctx.beginPath();
  ctx.moveTo(cx, cy - sh / 2);
  ctx.lineTo(cx + sw / 2, cy - sh / 2 + 18 * p);
  ctx.lineTo(cx + sw / 2, cy + 10 * p);
  ctx.quadraticCurveTo(cx + sw / 2, cy + sh / 2 - 5 * p, cx, cy + sh / 2);
  ctx.quadraticCurveTo(cx - sw / 2, cy + sh / 2 - 5 * p, cx - sw / 2, cy + 10 * p);
  ctx.lineTo(cx - sw / 2, cy - sh / 2 + 18 * p);
  ctx.closePath();
  ctx.strokeStyle = 'white';
  ctx.lineWidth = 4 * p;
  ctx.stroke();

  // Check mark inside shield
  ctx.beginPath();
  ctx.moveTo(cx - 15 * p, cy + 2 * p);
  ctx.lineTo(cx - 3 * p, cy + 14 * p);
  ctx.lineTo(cx + 18 * p, cy - 10 * p);
  ctx.strokeStyle = 'white';
  ctx.lineWidth = 5 * p;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.stroke();

  // "TH" text at bottom
  ctx.font = `bold ${18 * p}px sans-serif`;
  ctx.fillStyle = 'rgba(255,255,255,0.9)';
  ctx.textAlign = 'center';
  ctx.fillText('TH', cx, cy + sh / 2 + 22 * p);

  return canvas;
}

drawIcon(document.getElementById('c192'), 192);
drawIcon(document.getElementById('c512'), 512);

// Auto download
['c192', 'c512'].forEach(id => {
  const canvas = document.getElementById(id);
  const size = id === 'c192' ? 192 : 512;
  const link = document.createElement('a');
  link.download = `icon-${size}.png`;
  link.href = canvas.toDataURL('image/png');
  link.click();
});
</script>
</body>
</html>

name: Build & Deploy ThaiHelp

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build
        run: npx next build

      - name: Deploy to Server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            set -e
            BASE="/home/admin/domains/thaihelp.xman4289.com"

            echo "=== ThaiHelp Deploy ==="

            # Pull latest
            cd $BASE/repo
            git pull origin main

            # Install + Build on server
            npm install --legacy-peer-deps
            rm -rf .next
            npx next build

            # Deploy standalone
            mkdir -p $BASE/app
            rm -rf $BASE/app/*
            cp -r .next/standalone/. $BASE/app/
            mkdir -p $BASE/app/.next
            cp -r .next/static $BASE/app/.next/static
            cp -r public $BASE/app/public

            # Restart
            cd $BASE/app
            pm2 restart thaihelp 2>/dev/null || PORT=3000 pm2 start server.js --name thaihelp
            pm2 save

            echo "=== Deploy Done ==="
